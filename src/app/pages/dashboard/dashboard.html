<div class="dashboard">
  <div class="card" *ngIf="chartData$ | async as chartData">
    <h3>Bug Status</h3>
    <canvas baseChart [data]="chartData" [type]="'pie'"></canvas>
  </div>

  <div class="card" *ngIf="chartData$ | async as chartData">
    <h3>Another Chart</h3>
    <canvas baseChart [data]="chartData" [type]="'bar'"></canvas>
  </div>
</div>
